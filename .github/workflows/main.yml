name: Run Video Factory

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Run
        run: |
          # 리포지토리 안의 my-shorts-factory 폴더로 이동합니다.
          cd my-shorts-factory
          npm install
          npm run render






