name: Run Video Factory

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Run
        # 여기서 로봇에게 my-shorts-factory 폴더로 이동하라고 강제 명령합니다.
        run: |
          cd my-shorts-factory
          npm install
          npm run render







