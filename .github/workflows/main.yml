name: Run Video Factory

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Run
        # 핵심: 'cd my-shorts-factory'를 지우고 현재 위치에서 바로 실행합니다.
        run: |
          npm install
          npm run render









