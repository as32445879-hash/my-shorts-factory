name: Run Video Factory

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Run
        # 핵심: 로봇이 'my-shorts-factory' 폴더 안으로 들어가서 작업하게 합니다.
        run: |
          cd my-shorts-factory
          npm install
          npm run render










