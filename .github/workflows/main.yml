name: Run Video Factory

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Run
        run: |
          # 1. package.json이 있는 실제 위치를 찾습니다.
          TARGET_DIR=$(find . -name "package.json" -exec dirname {} \; | head -n 1)
          echo "Found package.json in: $TARGET_DIR"
          
          # 2. 해당 위치로 이동하여 작업을 수행합니다.
          cd "$TARGET_DIR"
          npm install
          npm run render






